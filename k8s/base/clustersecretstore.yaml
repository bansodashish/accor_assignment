apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  # Must match secretStoreRef.name in externalsecret.yaml
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: eu-west-1
      # Authenticates using the IRSA-annotated redemption-api service account.
      # No static credentials — the SA's IAM role already has the
      # secretsmanager:GetSecretValue policy scoped to /prod/redemption/app.
      auth:
        jwt:
          serviceAccountRef:
            name: redemption-api
            namespace: redemption
