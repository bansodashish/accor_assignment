apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: redemption-api-slo
  namespace: observability
  labels:
    release: kube-prometheus-stack
spec:
  groups:
    # ── Recording rules ──────────────────────────────────────────────────────
    # Pre-compute error ratios over multiple windows for burn-rate evaluation.
    - name: redemption.slo.recordings
      interval: 30s
      rules:
        - record: job:http_error_ratio:rate5m
          expr: |
            sum(rate(http_requests_total{namespace="redemption",status=~"5.."}[5m]))
            / sum(rate(http_requests_total{namespace="redemption"}[5m]))

        - record: job:http_error_ratio:rate1h
          expr: |
            sum(rate(http_requests_total{namespace="redemption",status=~"5.."}[1h]))
            / sum(rate(http_requests_total{namespace="redemption"}[1h]))

        - record: job:http_error_ratio:rate6h
          expr: |
            sum(rate(http_requests_total{namespace="redemption",status=~"5.."}[6h]))
            / sum(rate(http_requests_total{namespace="redemption"}[6h]))

    # ── Availability SLO: 99.95% (error budget = 0.05%) ──────────────────────
    # Multi-burn-rate pattern from the Google SRE Workbook.
    - name: redemption.slo.availability
      rules:
        # Fast burn (14x) — page immediately: consuming full budget in ~1 h
        - alert: RedemptionHighErrorBurnRate
          expr: |
            (job:http_error_ratio:rate1h > (14 * 0.0005))
            and
            (job:http_error_ratio:rate5m > (14 * 0.0005))
          for: 2m
          labels:
            severity: critical
            slo: availability
            service: redemption-api
          annotations:
            summary: "Redemption fast error burn (14x) — SLO at risk"
            description: >
              Error rate is consuming the 99.95% availability budget 14× faster
              than sustainable. Investigate and consider rollback.
            runbook_url: "https://wiki.example.com/runbooks/redemption/error-burn"

        # Slow burn (3x) — warn: consuming full budget in ~2 days
        - alert: RedemptionSlowErrorBurnRate
          expr: |
            (job:http_error_ratio:rate6h > (3 * 0.0005))
            and
            (job:http_error_ratio:rate1h > (3 * 0.0005))
          for: 15m
          labels:
            severity: warning
            slo: availability
            service: redemption-api
          annotations:
            summary: "Redemption slow error burn (3x) — SLO degrading"
            description: >
              Error rate is consuming the availability budget at 3× the sustainable rate.
            runbook_url: "https://wiki.example.com/runbooks/redemption/error-burn"

    # ── Latency SLO: p99 < 250 ms ────────────────────────────────────────────
    - name: redemption.slo.latency
      rules:
        - alert: RedemptionHighP99Latency
          expr: |
            histogram_quantile(0.99,
              sum(rate(http_request_duration_seconds_bucket{namespace="redemption"}[5m])) by (le)
            ) > 0.25
          for: 5m
          labels:
            severity: warning
            slo: latency
            service: redemption-api
          annotations:
            summary: "Redemption p99 latency exceeds 250 ms SLO"
            description: "p99 = {{ $value | humanizeDuration }}. SLO target is 250 ms."
            runbook_url: "https://wiki.example.com/runbooks/redemption/latency"

        - alert: RedemptionCriticalP99Latency
          expr: |
            histogram_quantile(0.99,
              sum(rate(http_request_duration_seconds_bucket{namespace="redemption"}[5m])) by (le)
            ) > 1.0
          for: 2m
          labels:
            severity: critical
            slo: latency
            service: redemption-api
          annotations:
            summary: "Redemption p99 latency critically high (> 1 s)"
            description: "p99 = {{ $value | humanizeDuration }}. Immediate action required."
            runbook_url: "https://wiki.example.com/runbooks/redemption/latency"

    # ── Capacity / saturation ────────────────────────────────────────────────
    - name: redemption.capacity
      rules:
        - alert: RedemptionHPAMaxedOut
          expr: |
            kube_horizontalpodautoscaler_status_current_replicas{
              namespace="redemption",
              horizontalpodautoscaler="redemption-api"
            }
            >=
            kube_horizontalpodautoscaler_spec_max_replicas{
              namespace="redemption",
              horizontalpodautoscaler="redemption-api"
            }
          for: 5m
          labels:
            severity: warning
            service: redemption-api
          annotations:
            summary: "Redemption HPA at max replicas — no further scale-out possible"
            description: >
              HPA has reached its ceiling of 120 replicas for >5 min.
              Evaluate increasing maxReplicas or the Karpenter burst limit.

        - alert: RedemptionPodsPending
          expr: |
            count(kube_pod_status_phase{namespace="redemption", phase="Pending"}) > 0
          for: 3m
          labels:
            severity: warning
            service: redemption-api
          annotations:
            summary: "Redemption pods stuck Pending for > 3 min"
            description: >
              Karpenter may be unable to provision nodes.
              Check pool limits, EC2 capacity, and IAM permissions.
