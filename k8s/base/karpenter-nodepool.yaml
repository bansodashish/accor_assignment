apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: redemption-burst
spec:
  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 5m
  limits:
    cpu: "800"
    memory: 1600Gi
  template:
    metadata:
      labels:
        workload: redemption-burst
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: redemption-burst
      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
        - key: kubernetes.io/os
          operator: In
          values: ["linux"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["on-demand", "spot"]
        - key: node.kubernetes.io/instance-type
          operator: In
          values: ["m6i.large", "m6i.xlarge", "m6a.large", "m6a.xlarge", "c6i.large", "c6i.xlarge"]
---
apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: redemption-burst
spec:
  amiFamily: AL2023
  # NOTE: 'redemption-prod-node-role' and the 'karpenter.sh/discovery' tag values
  # are substituted at deploy time by the Jenkinsfile sed step so they match the
  # environment's cluster name (redemption-dev / redemption-staging / redemption-prod).
  # Do NOT hand-edit the cluster name here — change the CLUSTER_NAME Jenkins parameter.
  role: redemption-prod-node-role
  subnetSelectorTerms:
    # Selects only private subnets — they carry this tag from the network Terraform module.
    # Public subnets intentionally do NOT have this tag, so Karpenter never launches
    # worker nodes there.
    - tags:
        karpenter.sh/discovery: redemption-prod
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: redemption-prod
  tags:
    Application: the-redemption
    Environment: prod
    ManagedBy: karpenter

