apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: redemption-api-default-deny-except-required
  namespace: redemption
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: redemption-api
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: TCP
          port: 8080
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        # Restrict HTTPS egress to RFC-1918 private space only.
        # All AWS API calls (ECR, S3, STS, Secrets Manager, DynamoDB) now
        # route through VPC PrivateLink endpoints which have private IPs.
        # The broad 0.0.0.0/0:443 rule is intentionally removed.
        - ipBlock:
            cidr: 10.0.0.0/8
            except:
              - 169.254.169.254/32   # EC2 metadata — blocked as defense-in-depth
      ports:
        - protocol: TCP
          port: 443

