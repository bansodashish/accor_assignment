apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

patches:
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: redemption-api
        namespace: redemption
      spec:
        replicas: 2
        template:
          spec:
            containers:
              - name: api
                env:
                  - name: ENVIRONMENT
                    value: dev
                  - name: AWS_REGION
                    value: eu-west-1
                  - name: IDEMPOTENCY_TABLE
                    value: redemption-dev-idempotency
                resources:
                  requests:
                    cpu: "250m"
                    memory: "512Mi"
                  limits:
                    cpu: "1"
                    memory: "1024Mi"

  - patch: |
      apiVersion: autoscaling/v2
      kind: HorizontalPodAutoscaler
      metadata:
        name: redemption-api
        namespace: redemption
      spec:
        minReplicas: 2
        maxReplicas: 20

  - patch: |
      apiVersion: networking.k8s.io/v1
      kind: Ingress
      metadata:
        name: redemption-api
        namespace: redemption
        annotations:
          # Managed by scripts/sync_waf_arn_to_ingress.sh (do not edit manually)
          alb.ingress.kubernetes.io/wafv2-acl-arn: "arn:aws:wafv2:eu-west-1:AWS_ACCOUNT:regional/webacl/redemption-dev/REPLACE_WAF_ID"
      spec:
        rules:
          - host: redemption-dev.adscld.biz
            http:
              paths:
                - path: /
                  pathType: Prefix
                  backend:
                    service:
                      name: redemption-api
                      port:
                        name: http

  - patch: |
      apiVersion: external-secrets.io/v1beta1
      kind: ExternalSecret
      metadata:
        name: redemption-api
        namespace: redemption
      spec:
        dataFrom:
          - extract:
              key: /dev/redemption/app

  - patch: |
      apiVersion: karpenter.k8s.aws/v1
      kind: EC2NodeClass
      metadata:
        name: redemption-burst
      spec:
        role: redemption-dev-node-role
        subnetSelectorTerms:
          - tags:
              karpenter.sh/discovery: redemption-dev
        securityGroupSelectorTerms:
          - tags:
              karpenter.sh/discovery: redemption-dev
        tags:
          Application: the-redemption
          Environment: dev
          ManagedBy: karpenter
